# --- GENERAL ---
general {
    border_size = 1
    gaps_in = 6
    gaps_out = 12

    # Red on focused, subtle on inactive
    col.active_border = rgba(FF2D2DCC) rgba(FF2D2D66) 45deg
    col.inactive_border = rgba(FFFFFF12)

    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 12
    hover_icon_on_border = true

    allow_tearing = false
    snap {
        enabled = true
        window_gap = 10
        monitor_gap = 14
    }
}

# ─── Decoration ──────────────────────────────

decoration {
    rounding = 14
    rounding_power = 4.0   # squircle-like (super-ellipse approximation)

    active_opacity = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0

    # No drop shadow — Nothing OS doesn't use shadows
    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 7
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false

        # Nothing-style: slight contrast bump + grain
        contrast = 0.92
        brightness = 0.88
        vibrancy = 0.10
        noise = 0.020   # film grain — VERY Nothing

        # Specific layers (status bar, popups blur)
        special = false
        popups = true
        popups_ignorealpha = 0.2
    }

    # Dim inactive windows slightly (premium depth)
    dim_inactive = false
    dim_strength = 0.15
    dim_special = 0.50
}
# ─── ANIMATIONS ─────────────────────────────────────────────
# Nothing OS — smooth, subtle, never flashy
# Bezier curves tuned for premium feel

animations {
    enabled = true
#    first_launch_animation = true

    # Custom beziers — Nothing signature curves
    bezier = nothingIn, 0.25, 1.0, 0.35, 1.0
    bezier = nothingOut, 0.65, 0.0, 0.75, 0.0
    bezier = nothingMove, 0.22, 1.0, 0.36, 1.0
    bezier = nothingFade, 0.33, 0.0, 0.67, 1.0
    bezier = nothingBounce, 0.34, 1.56, 0.64, 1.0
    bezier = nothingSnap, 0.85, 0.0, 0.15, 1.0

    # Window open/close
    animation = windowsIn, 1, 4, nothingIn, slide
    animation = windowsOut, 1, 3, nothingOut, slide
    animation = windowsMove, 1, 4, nothingMove

    # Fade
    animation = fadeIn, 1, 3, nothingFade
    animation = fadeOut, 1, 3, nothingFade
    animation = fadeSwitch, 1, 3, nothingFade
    animation = fadeShadow, 1, 4, nothingFade
    animation = fadeDim, 1, 4, nothingFade

    # Border
    animation = border, 1, 5, nothingSnap
    animation = borderangle, 1, 30, nothingSnap, loop

    # Workspace switch
    animation = workspaces, 1, 4, nothingMove, slide
    animation = specialWorkspace, 1, 4, nothingBounce, slidevert

    # Layers (popups, waybar, etc)
    animation = layers, 1, 3, nothingFade, fade
    animation = fadeLayers, 1, 3, nothingFade
}



# ─── LAYOUT ─────────────────────────────────────────────────

dwindle {
 #   pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
    force_split = 2
    special_scale_factor = 0.85
    split_width_multiplier = 1.0
 #   no_gaps_when_only = 0
}

master {
    new_status = master
    special_scale_factor = 0.85
 #   no_gaps_when_only = 0
}


# ─── MISC ───────────────────────────────────────────────────

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0

 #   vfr = true
 #   vrr = 1

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    animate_manual_resizes = true
    animate_mouse_windowdragging = true

    enable_swallow = true
    swallow_regex = ^(foot|alacritty|kitty)$

    focus_on_activate = true
 #   new_window_takes_over_fullscreen = 2

    initial_workspace_tracking = 1
}

# ─── GROUP BAR STYLE ────────────────────────────────────────

group {
    col.border_active = rgba(FF2D2Dcc)
    col.border_inactive = rgba(3A3A3C66)

    groupbar {
        enabled = true
        height = 2
        col.active = rgba(FF2D2Dcc)
        col.inactive = rgba(3A3A3C44)
        font_family = Inter
        font_size = 10
        text_color = rgba(FFFFFFCC)
        render_titles = false
        gradients = false
    }
}



# ╔══════════════════════════════════════════════════════════════╗
# ║   Window Rules                                               ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Opacity ────────────────────────────────────────────────────
windowrulev = opacity 0.94 0.88, class:^(kitty)$
windowrulev = opacity 0.97 0.92, class:^(code|Code|VSCodium)$
windowrulev = opacity 1.00 0.97, class:^(firefox|chromium|brave-browser|zen)$
windowrulev = opacity 0.97 0.92, class:^(discord|telegram-desktop|vesktop)$
windowrulev = opacity 0.97 0.92, class:^(Spotify|spotify)$
windowrulev = opacity 0.97 0.94, class:^(org\.gnome\.Nautilus|thunar)$

# ── Float ──────────────────────────────────────────────────────
windowrulev = float, class:^(floating_term)$
windowrulev = float, class:^(pavucontrol)$
windowrulev = float, class:^(nm-connection-editor)$
windowrulev = float, class:^(blueman-manager)$
windowrulev = float, class:^(org\.gnome\.Calculator)$
windowrulev = float, class:^(nwg-look|qt5ct|qt6ct)$
windowrulev = float, class:^(xdg-desktop-portal-gtk)$
windowrulev = float, title:^(Picture-in-Picture)$
windowrulev = float, title:^(Open File|Save File|Save As)(.*)$

# ── Size + center ──────────────────────────────────────────────
windowrulev = size 900 580, class:^(floating_term)$
windowrulev = center,       class:^(floating_term)$
windowrulev = size 820 580, class:^(pavucontrol)$
windowrulev = center,       class:^(pavucontrol)$
windowrulev = size 750 520, class:^(nm-connection-editor)$
windowrulev = center,       class:^(nm-connection-editor)$
windowrulev = size 750 520, class:^(blueman-manager)$
windowrulev = center,       class:^(blueman-manager)$

# ── Picture-in-Picture ─────────────────────────────────────────
windowrulev = pin,          title:^(Picture-in-Picture)$
windowrulev = size 480 270, title:^(Picture-in-Picture)$
windowrulev = move 100%-w-20 100%-h-20, title:^(Picture-in-Picture)$

# ── Workspaces ─────────────────────────────────────────────────
windowrulev = workspace 2, class:^(code|Code|VSCodium)$
windowrulev = workspace 3, class:^(firefox|chromium|brave-browser|zen)$
windowrulev = workspace 4, class:^(discord|telegram-desktop|vesktop)$
windowrulev = workspace 5, class:^(Spotify|spotify)$

# ── Idle inhibit ───────────────────────────────────────────────
windowrulev = idleinhibit focus,      class:^(mpv|vlc)$
windowrulev = idleinhibit fullscreen, class:^(firefox|chromium|zen)$
windowrulev = idleinhibit fullscreen, class:^(Steam|steam_app_.*)$


# Все conky-виджеты делают плавающими, скруглёнными и без теней
windowrulev = float, class:^(conky)$
windowrulev = rounding 20, class:^(conky)$
windowrulev = noanim, class:^(conky)$
windowrulev = opacity 0.95, class:^(conky)$
windowrulev = pin, class:^(conky)$

# Позволяет перетаскивать виджеты без фокуса (опционально)
# windowrulev2 = move cursor 1, class:^(conky)$


windowrulev = float, class:^(python)$, title:^(Nothing Widgets)$
windowrulev = pin, title:^(Nothing Widgets)$
