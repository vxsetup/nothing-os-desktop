# ═══════════════════════════════════════════════════════════
#  Nothing OS — Hyprlock
#  Premium edition: dot grid bg, hero NDot clock, pill status bar
#  Palette: #FF2D2D / #F7F7F7 / #18181C
# ═══════════════════════════════════════════════════════════

general {
    disable_loading_bar    = true
    grace                  = 0
    hide_cursor            = true
    no_fade_in             = false
    no_fade_out            = false
    ignore_empty_input     = true
    text_trim              = true
    immediate_render       = true
}

# ─── BACKGROUND ────────────────────────────────────────────
# Layer 1: blurred desktop screenshot (very dark)
background {
    monitor             =
    path                = screenshot
    blur_passes         = 5
    blur_size           = 9
    noise               = 0.0150
    contrast            = 0.80
    brightness          = 0.20
    vibrancy            = 0.10
    vibrancy_darkness   = 0.40
}

# Layer 2: solid Nothing dark wash (almost opaque)
background {
    monitor     =
    color       = rgba(15, 15, 17, 0.78)
    blur_passes = 0
}

# ═══════════════════════════════════════════════════════════
#  HERO — NDot dot-matrix clock
#  Massive, centered, white. Letter-spacing for proper dot gap
# ═══════════════════════════════════════════════════════════

label {
    monitor     =
    text        = cmd[update:1000] echo "<span letter_spacing='10000'>$(date +'%H:%M')</span>"
    color       = rgba(255, 255, 255, 1.0)
    font_size   = 160
    font_family = Ndot 55
    position    = 0, 200
    halign      = center
    valign      = center
}

# Tiny red dot under clock — Nothing brand mark
label {
    monitor     =
    text        = ●
    color       = rgba(255, 45, 45, 1.0)
    font_size   = 8
    font_family = Inter
    position    = 0, 100
    halign      = center
    valign      = center
}

# ─── DATE — caps mono ──────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "<span letter_spacing='3000'>$(date +'%A · %d %B' | tr '[:lower:]' '[:upper:]')</span>"
    color       = rgba(199, 199, 204, 0.85)
    font_size   = 12
    font_family = JetBrains Mono Bold
    position    = 0, 60
    halign      = center
    valign      = center
}

# ─── USER@HOSTNAME — mono dim ──────────────────────────────
label {
    monitor     =
    text        = cmd[update:0] echo "<span letter_spacing='2500'>$(echo $USER | tr '[:lower:]' '[:upper:]')@$(hostname | tr '[:lower:]' '[:upper:]')</span>"
    color       = rgba(110, 110, 115, 1.0)
    font_size   = 10
    font_family = JetBrains Mono Bold
    position    = 0, 25
    halign      = center
    valign      = center
}

# ═══════════════════════════════════════════════════════════
#  PASSWORD INPUT — pill-shaped, no internal label
# ═══════════════════════════════════════════════════════════

input-field {
    monitor              =
    size                 = 360, 56
    outline_thickness    = 1
    dots_size            = 0.26
    dots_spacing         = 0.50
    dots_center          = true
    dots_rounding        = -1
    outer_color          = rgba(255, 255, 255, 0.08)
    inner_color          = rgba(20, 20, 22, 0.92)
    font_color           = rgba(255, 255, 255, 1.0)
    fade_on_empty        = false
    placeholder_text     = <span font_family="Inter" foreground="##5A5A5F" letter_spacing="3000">ENTER PASSWORD</span>
    hide_input           = false
    rounding             = 28
    check_color          = rgba(48, 209, 88, 1.0)
    fail_color           = rgba(255, 45, 45, 1.0)
    fail_text            = <span font_family="Inter" foreground="##FF2D2D" letter_spacing="3000">$ATTEMPTS · WRONG</span>
    fail_timeout         = 2000
    position             = 0, -160
    halign               = center
    valign               = center
    capslock_color       = rgba(255, 45, 45, 1.0)
    numlock_color        = -1
    bothlock_color       = rgba(255, 45, 45, 1.0)
    invert_numlock       = false
    swap_font_color      = false
}

# ═══════════════════════════════════════════════════════════
#  TOP BAR — left/center/right status row
#  Mimics Nothing OS phone status bar at top edge
# ═══════════════════════════════════════════════════════════

# Top-left: red glyph dot (brand mark, like in waybar)
label {
    monitor     =
    text        = ●
    color       = rgba(255, 45, 45, 1.0)
    font_size   = 9
    font_family = Inter
    position    = 24, -22
    halign      = left
    valign      = top
}

# Top-left: LOCKED · HH:MM
label {
    monitor     =
    text        = cmd[update:0] echo "<span letter_spacing='2500'>LOCKED · $(date +'%H:%M')</span>"
    color       = rgba(199, 199, 204, 0.55)
    font_size   = 9
    font_family = JetBrains Mono Bold
    position    = 42, -22
    halign      = left
    valign      = top
}

# Top-center: hostname (caps mono)
label {
    monitor     =
    text        = cmd[update:0] echo "<span letter_spacing='3500'>$(hostname | tr '[:lower:]' '[:upper:]')</span>"
    color       = rgba(199, 199, 204, 0.70)
    font_size   = 9
    font_family = JetBrains Mono Bold
    position    = 0, -22
    halign      = center
    valign      = top
}

# Top-right: keyboard layout
label {
    monitor     =
    text        = cmd[update:1000] echo "<span letter_spacing='3000'>$(hyprctl devices -j 2>/dev/null | jq -r '.keyboards[] | select(.main==true) | .active_keymap' 2>/dev/null | cut -c1-2 | tr '[:lower:]' '[:upper:]' || echo "EN")</span>"
    color       = rgba(199, 199, 204, 0.70)
    font_size   = 9
    font_family = JetBrains Mono Bold
    position    = -24, -22
    halign      = right
    valign      = top
}

# ═══════════════════════════════════════════════════════════
#  BOTTOM BAR — status row
# ═══════════════════════════════════════════════════════════

# Bottom-center: hint text in caps mono
label {
    monitor     =
    text        = <span letter_spacing='4000'>TYPE TO UNLOCK</span>
    color       = rgba(110, 110, 115, 1.0)
    font_size   = 9
    font_family = JetBrains Mono Bold
    position    = 0, 60
    halign      = center
    valign      = bottom
}

# Bottom-center: red accent dot above hint
label {
    monitor     =
    text        = ●
    color       = rgba(255, 45, 45, 1.0)
    font_size   = 6
    font_family = Inter
    position    = 0, 88
    halign      = center
    valign      = bottom
}

# Bottom-left: uptime
label {
    monitor     =
    text        = cmd[update:60000] echo "<span letter_spacing='2500'>UP $(uptime -p | sed 's/up //' | sed 's/ minutes/M/' | sed 's/ minute/M/' | sed 's/ hours/H/' | sed 's/ hour/H/' | sed 's/ days/D/' | sed 's/ day/D/' | sed 's/,//g' | tr '[:lower:]' '[:upper:]')</span>"
    color       = rgba(110, 110, 115, 0.65)
    font_size   = 8
    font_family = JetBrains Mono Bold
    position    = 24, 24
    halign      = left
    valign      = bottom
}

# Bottom-right: battery (only if BAT0 exists)
label {
    monitor     =
    text        = cmd[update:30000] [ -d /sys/class/power_supply/BAT0 ] && echo "<span letter_spacing='2500'>BAT $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null)%</span>" || echo ""
    color       = rgba(110, 110, 115, 0.65)
    font_size   = 8
    font_family = JetBrains Mono Bold
    position    = -24, 24
    halign      = right
    valign      = bottom
}

# ═══════════════════════════════════════════════════════════
#  SIDE DECORATIONS — vertical "MM/DD/YYYY" mono ticker
#  Adds depth on left & right edges (like Nothing OS detail)
# ═══════════════════════════════════════════════════════════

# Left edge: vertical mono date with tracking
label {
    monitor     =
    text        = cmd[update:60000] echo "<span letter_spacing='6000'>NOTHING · OS</span>"
    color       = rgba(74, 74, 79, 0.85)
    font_size   = 8
    font_family = JetBrains Mono Bold
    rotate      = -90
    position    = 18, 0
    halign      = left
    valign      = center
}

# Right edge: vertical "AUTHORIZED USER ONLY" mono
label {
    monitor     =
    text        = <span letter_spacing='6000'>AUTHORIZED USER ONLY</span>
    color       = rgba(74, 74, 79, 0.85)
    font_size   = 8
    font_family = JetBrains Mono Bold
    rotate      = 90
    position    = -18, 0
    halign      = right
    valign      = center
}
