# ==========================================
# ENVIRONMENT (CLEAN)
# ==========================================

env = XCURSOR_SIZE,24
env = GTK_THEME,Adwaita-dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_STYLE_OVERRIDE=breeze
# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

#autogenerated = 1

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/general.conf
source = ~/.config/hypr/colors.conf


exec-once = sleep 3 && bluetoothctl power on
exec-once = blueman-applet
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = awww
exec-once = waybar
#exec-once = dunst
exec-once = hypridle
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = swaybg -i ~/Pictures/wall.jpg
exec-once = nothing-volume --daemon
exec-once = nothing-bluetooth --daemon
exec-once = nothing-network --daemon
exec-once = nothing-control --daemon
exec-once = nothing-calendar --daemon
exec-once = nothing-launcher --daemon
exec-once = nothing-about --daemon
exec-once = nothing-notifications --daemon
exec-once = nothing-update --daemon
#exec-once = rm -f /tmp/wob.sock && mkfifo /tmp/wob.sock && tail -f /tmp/wob.sock | wob -c ~/.config/wob/wob.ini
exec-once = mako
exec-once = gsettings set org.gnome.desktop.interface gtk-theme           'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme          'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme        'Bibata-Modern-Ice'
exec-once = gsettings set org.gnome.desktop.interface cursor-size         22
exec-once = gsettings set org.gnome.desktop.interface color-scheme        'prefer-dark'
exec-once = hyprctl setcursor Bibata-Modern-Ice 22
exec-once = nothing-widgets --daemon
exec-once = timeout 3 nothing-splash || true
windowrulev = float, class:^(wofi|rofi|pavucontrol|blueman-manager)$
#windowrulev = center, class:^(wofi|rofi|pavucontrol|blueman-manager)$
#windowrulev = noborder, class:^(wofi|rofi|pavucontrol|blueman-manager)$
